<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto y Redes | María Camino a Jesús</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/components.js" defer></script>
</head>
<body style="padding-top: 100px;">
    <app-header base-path="../"></app-header>
    <main>
        <section class="section-padding">
            <div class="container" style="max-width: 700px; text-align: center;">
                <h2 class="section-title" style="margin-bottom: 0.5rem;">Síguenos</h2>
                <p style="color: var(--clr-gray); margin-bottom: 3rem;">Encuentra nuestro contenido oficial en las siguientes plataformas.</p>

                <div style="display: flex; flex-direction: column; gap: 1.2rem; align-items: center;">
                    <a href="https://www.youtube.com/@mariacaminoajesus" target="_blank"
                       style="display: flex; align-items: center; gap: 0.9rem; background: #FF0000; color: #fff; font-weight: 700; font-size: 1.1rem; padding: 1rem 2.5rem; border-radius: 50px; box-shadow: 0 6px 20px rgba(255,0,0,0.3); transition: all 0.3s ease; text-decoration: none; width: 100%; max-width: 380px; justify-content: center;"
                       onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 10px 28px rgba(255,0,0,0.45)'"
                       onmouseout="this.style.transform=''; this.style.boxShadow='0 6px 20px rgba(255,0,0,0.3)'">
                        <i data-lucide="youtube" style="width:28px; height:28px;"></i>
                        Canal de YouTube Oficial
                    </a>
                    <a href="https://instagram.com/mariacaminoajesus" target="_blank"
                       style="display: flex; align-items: center; gap: 0.9rem; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: #fff; font-weight: 700; font-size: 1.1rem; padding: 1rem 2.5rem; border-radius: 50px; box-shadow: 0 6px 20px rgba(188,24,136,0.3); transition: all 0.3s ease; text-decoration: none; width: 100%; max-width: 380px; justify-content: center;"
                       onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 10px 28px rgba(188,24,136,0.45)'"
                       onmouseout="this.style.transform=''; this.style.boxShadow='0 6px 20px rgba(188,24,136,0.3)'">
                        <i data-lucide="instagram" style="width:28px; height:28px;"></i>
                        Instagram Oficial
                    </a>
                </div>
            </div>
        </section>
    </main>
    <app-footer base-path="../"></app-footer>
    <script src="../script.js"></script>
</body>
</html>
